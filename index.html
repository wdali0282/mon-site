<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assistant IA - Posez vos questions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 Assistant IA</h1>
            <p class="subtitle">Posez n'importe quelle question</p>
        </header>

        <main>
            <div class="chat-container" id="chatContainer">
                <div class="message assistant">
                    <div class="message-content">
                        Bonjour ! Je suis votre assistant IA. Posez-moi n'importe quelle question et je ferai de mon mieux pour y répondre.
                    </div>
                </div>
            </div>

            <form class="input-container" id="questionForm">
                <textarea 
                    id="questionInput" 
                    placeholder="Tapez votre question ici..."
                    rows="1"
                    required
                ></textarea>
                <button type="submit" id="sendButton">
                    <span class="button-text">Envoyer</span>
                    <span class="button-loader hidden">⏳</span>
                </button>
            </form>
        </main>

        <footer>
            <p>💡 Astuce : Soyez précis dans vos questions pour obtenir de meilleures réponses</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
